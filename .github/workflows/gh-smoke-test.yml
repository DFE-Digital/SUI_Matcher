name: Smoke Test Deployed Apps

on:
  workflow_run:
    workflows: ["Azure App Deployment", "Build and Upload Client Watcher", "Build and Upload DBS Client Watcher"]
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        env: 
            AZURE_ENV_NAME: ${{ inputs.environment }}
            AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
            AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
            AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            AZURE_LOCATION: "westeurope"
            AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
            CLIENT_VERSION: ${{ inputs.version }}
            BLOB_STORAGE_LOCATION: ${{ inputs.blob_storage_location }}
            STORAGE_ACCOUNT: ${{ inputs.storage_account }}

        steps:
        - name: Checkout code
          uses: actions/checkout@v3
          with:
            ref: ${{ env.CLIENT_VERSION }}

        - name: Setup .NET
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: '9.0.x'

        - name: Login to Azure
          uses: azure/login@v2
          with:
            client-id: ${{ env.AZURE_CLIENT_ID }}
            tenant-id: ${{ env.AZURE_TENANT_ID }}
            subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

        - name: Set Azure Subscription
          run: |
            az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

        - name: Determine triggering upstream workflow
          id: detect_workflow
          run: echo "triggered_workflow=${{ github.event.workflow }}" >> $GITHUB_ENV

        - name: Upload to Blob Storage
          run:
            az storage blob upload-batch --destination ${{ env.BLOB_STORAGE_LOCATION }} --account-name ${{ env.STORAGE_ACCOUNT }} --source ./output --pattern "*.exe" --overwrite
            
        - name: Upload test data CSV to SUI Client VM
          if: env.triggered_workflow == 'Azure App Deployment' || env.triggered_workflow == 'Build and Upload Client Watcher'
          run: |
            echo "Uploading test data CSV to the virtual machine..."
            scp -i ~/.ssh/id_rsa ./test-data.csv azureuser@${{ secrets.VM_IP_ADDRESS }}:/home/azureuser/

        - name: Run Smoke Tests for SUI Client and Server
          if: env.triggered_workflow == 'Azure App Deployment' || env.triggered_workflow == 'Build and Upload Client Watcher'
          run: |
            az vm run-command invoke \
              --command-id SuiClientServerSmokeTestScript \
              --name ${{ secrets.VM_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --scripts 'Get-SerialConsole' \
              --parameters '{"paramName":"paramValue"}'

        - name: Upload test data CSV to DBS Client VM
          if: env.triggered_workflow == 'Build and Upload DBS Client Watcher'
          run: |
            echo "Uploading test data CSV to the virtual machine..."
            scp -i ~/.ssh/id_rsa ./test-data.csv azureuser@${{ secrets.VM_IP_ADDRESS }}:/home/azureuser/

        - name: Run Smoke Tests for DBS Client and Server
          if: env.triggered_workflow == 'Build and Upload DBS Client Watcher'
          run: |
            az vm run-command invoke \
              --command-id DbsClientSmokeTestScript \
              --name ${{ secrets.VM_NAME }} \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --scripts 'Get-SerialConsole' \
              --parameters '{"paramName":"paramValue"}'