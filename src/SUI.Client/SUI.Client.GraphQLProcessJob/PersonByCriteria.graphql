query PersonByCriteria($maxAge: Int, $paging: RequestCursorInput) {
    personByCriteria(maxAge: $maxAge, paging: $paging) {
        cursor {
            offset
            pageNumber
            pageSize
            returned
            totalSize
        },
        results {
            ... on Person {
                age
                addresses {
                    id
                    location {
                        postcode
                    }
                }
                dateOfBirth {
                    lower
                    upper
                    mask
                }
                id
                objectVersion
                forename
                surname
                gender
                nhsNumber
                preferredAddress {
                    id
                }
            }
        }
    }
}